<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Terms of Service — Storefront</title>
<meta name="description" content="Terms of Service for Storefront. Content coming soon.">
<meta name="theme-color" content="#F6F1E7">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F1E7;--paper-2:#EFE7D6;--paper-3:#EAE0CC;--ink:#1E1B16;--ink-soft:#4A443A;--ink-mute:#6B6456;
    --terra:#C4552F;--terra-deep:#A8431F;--line:#D9CDB6;--card:#FBF8F1;
    --serif:"Fraunces",Georgia,serif;--sans:"Work Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:1.05rem;line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  h1{font-family:var(--serif);font-weight:600;line-height:1.05;letter-spacing:-.02em;font-size:clamp(2.4rem,1.8rem + 3vw,4rem);margin:0}
  p{margin:0}
  a{color:var(--terra-deep);text-underline-offset:3px}
  a:hover{color:var(--terra)}
  svg{display:block;max-width:100%}
  .wrap{width:100%;max-width:1180px;margin:0 auto;padding:0 clamp(1.15rem,4vw,3rem)}
  .skip{position:absolute;left:-999px;top:0;z-index:200;background:var(--ink);color:var(--paper);padding:.75rem 1.1rem;border-radius:0 0 12px 0;font-weight:600}
  .skip:focus{left:0}
  a:focus-visible,button:focus-visible{outline:3px solid var(--terra);outline-offset:3px;border-radius:6px}
  .site-header{position:sticky;top:0;z-index:100;background:rgba(246,241,231,.86);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:center;justify-content:space-between;gap:1rem;min-height:70px}
  .brand{display:inline-flex;align-items:center;gap:.6rem;text-decoration:none;color:var(--ink);font-family:var(--serif);font-weight:600;font-size:1.28rem;letter-spacing:-.02em}
  .brand .mark{width:34px;height:34px;flex:none}
  .nav-links{display:none;align-items:center;gap:1.7rem;list-style:none;margin:0;padding:0}
  .nav-links a{color:var(--ink-soft);text-decoration:none;font-weight:500;font-size:.96rem}
  .nav-links a:hover{color:var(--terra-deep)}
  @media(min-width:760px){.nav-links{display:flex}}
  main{padding:clamp(3.5rem,9vw,7rem) 0 clamp(3rem,7vw,6rem);min-height:52vh}
  .eyebrow{font-family:var(--sans);font-weight:600;text-transform:uppercase;letter-spacing:.19em;font-size:.72rem;color:var(--terra-deep);margin-bottom:.7rem}
  .card{background:var(--card);border:1px solid var(--line);border-radius:26px;box-shadow:22px 26px 60px -34px rgba(30,27,22,.45);padding:clamp(2rem,5vw,3.4rem);max-width:60ch;margin-top:2rem}
  .card p{color:var(--ink-soft);margin-top:1rem}
  .back{display:inline-flex;align-items:center;gap:.5rem;margin-top:1.6rem;font-weight:600;text-decoration:none;min-height:44px}
  .site-footer{border-top:1px solid var(--line);padding:clamp(2.4rem,5vw,3.6rem) 0 2.6rem}
  .foot-nav{list-style:none;margin:0;padding:0;display:flex;flex-wrap:wrap;gap:.6rem 1.6rem}
  .foot-nav a{color:var(--ink-soft);text-decoration:none;font-weight:500;font-size:.96rem}
  .foot-nav a:hover{color:var(--terra-deep)}
  .foot-bottom{margin-top:1.8rem;padding-top:1.4rem;border-top:1px solid var(--line);color:var(--ink-mute);font-size:.85rem}
</style>
</head>
<body>
<a class="skip" href="#main">Skip to content</a>
<header class="site-header">
  <div class="wrap">
    <nav class="nav" aria-label="Primary">
      <a class="brand" href="index.html" aria-label="Storefront, home">
        <svg class="mark" viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <rect x="4" y="18" width="40" height="26" rx="3" fill="#C4552F"/>
          <path d="M6 18 L10 6 H38 L42 18 Z" fill="#1E1B16"/>
          <rect x="6" y="18" width="6" height="4" fill="#F6F1E7"/><rect x="14" y="18" width="6" height="4" fill="#F6F1E7"/>
          <rect x="22" y="18" width="6" height="4" fill="#F6F1E7"/><rect x="30" y="18" width="6" height="4" fill="#F6F1E7"/>
          <rect x="20" y="30" width="10" height="14" fill="#F6F1E7"/>
        </svg>
        <span>Storefront</span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#pricing">Pricing</a></li>
        <li><a href="index.html#who">Who We Help</a></li>
      </ul>
    </nav>
  </div>
</header>
<main id="main">
  <div class="wrap">
    <p class="eyebrow">Storefront</p>
    <h1>Terms of Service</h1>
    <div class="card">
      <p>Content coming soon.</p>
      <a class="back" href="index.html">&larr; Back to home</a>
    </div>
  </div>
</main>
<footer class="site-footer">
  <div class="wrap">
    <nav aria-label="Footer">
      <ul class="foot-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#pricing">Pricing</a></li>
        <li><a href="index.html#who">Who We Help</a></li>
        <li><a href="privacy.html">Privacy Policy</a></li>
        <li><a href="terms.html">Terms of Service</a></li>
        <li><a href="index.html">Contact</a></li>
      </ul>
    </nav>
    <div class="foot-bottom">&copy; 2026 Storefront. All rights reserved.</div>
  </div>
</footer>
</body>
</html>
